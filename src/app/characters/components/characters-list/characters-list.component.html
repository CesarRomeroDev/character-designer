<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
  @for (item of characterList(); track item) {
    @if ( !isLoading()) {
      <characters-list-items [characterListItems]="item.url" [characterListItemsHeight]="item.height" />
    }@else {
      <shared-skeleton-loader  [heightImg]="item.height"/>
    }
  }
</div>
